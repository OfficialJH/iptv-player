<!DOCTYPE html>
<html lang="en">

<head>
    <title>IPTV Player</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon created using https://www.favicon.cc/ -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <a href="https://officialjh.github.io/" target="_blank" style="font-size:20px;font-weight:bold">OfficialJH</a>
        <a href="https://iptv-org.github.io/" target="_blank">IPTV Channel Links</a>
    </div>

    <h2 id="playerHeader" style="word-break:break-word">IPTV Player</h2>
    <video id="videoPlayer" controls></video>

    <button onClick="toggleContent('channelBox')" style="background-color:var(--bg);padding:0;margin:10px;font-size:16px">Show/Hide Channels</button>

    <div id="channelBox" class="channel-box" style="display:none">
        <div style="display:flex;align-items:center">
            <button id="importExportBtn" title="Import/Export">⇄</button>
            <span style="flex:1;font-size:20px;font-weight:bold">Channels</span>
            <button onClick="toggleContent('inputContainer')" title="Add channel">✚</button>
        </div>

        <div id="inputContainer" class="input-container" style="display:none">
            <input id="channelURL" type="text" inputmode="url" placeholder="Enter M3U8 URL" />
            <input id="channelName" type="text" maxlength="40" placeholder="Channel name (max 40 chars)" />
            <button id="saveButton" style="flex:1 1 auto;width:auto">Save</button>
        </div>

        <hr style="width:100%">

        <div id="savedChannels"></div>
    </div>

    <script src="hls.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
